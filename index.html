<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Timestamped Photo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js" integrity="sha512-+EeCylkt9WHJk5tGJxYdecHOcXFRME7qnbsfeMsdQL6NUPYm2+uGFmyleEqsmVoap/f3dN/sc3BX9t9kHXkHHg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <style>
    /* 1. 全体のリセット */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /*background-color: #000;*/
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden; /* スクロールを禁止 */
      font-family: sans-serif;
      padding: 15px;
    }

    /* 2. アプリ全体のコンテナ */
    .app-container {
      position: relative;
      width: 100%;
      height: calc(100dvh - 30px); /* 動的ビューポート高さを使用 */
      background: white;
      border-radius: 20px;
    }

    .app-header {
      text-align: center;
      height: 50px;
    }
    .app-header h1 {
      font-size: clamp(25px, 5vw , 32px);
    }
    /* 3. カメラプレビュー領域 */
    .camera-view {
      position: absolute;
      top: 50px;
      left: 0;
      width: 100%;
      height: calc(100% - 170px);
      object-fit: contain;
      z-index: 1;
    }
    .camera-view video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }
    .camera-view canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
      display: none;
    }
    .camera-view img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 3;
      display: none;
    }

    /* 4. UIオーバーレイ（操作ボタンなど） */
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px; /* 操作エリアの高さ */
      display: flex;
      justify-content: center;
      align-items: end;
      z-index: 10;
      /*background: linear-gradient(transparent, rgba(0,0,0,0.5)); /* 下部を見やすく */
      padding-bottom: env(safe-area-inset-bottom); /* iPhoneのホームバー対策 */
    }

    .status {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 20px);
      max-height: 50px;
      overflow: hidden;
      z-index: 4;
      text-align: center;
      padding: 5px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .status.info {
      background: #e3f2fd;
      color: #1976d2;
      display: block;
    }

    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      display: block;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    /* 5. シャッターボタン */
    .shutter-button {
      min-width: 120px;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-bottom: 16px;
    }
    /*.shutter-button:active {
      transform: scale(0.9);
      background-color: #ccc;
    }*/
    .shutter-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      position: absolute;
      bottom: 0;
      right: 0;
      padding-right: 15px;
      overflow: hidden;
      font-size: clamp(8px, 2vw, 16px);
    }

    .loader {
      position: absolute;
      z-index: 40;
      top: 50%;
      left: 50%;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="app-header">
      <h1>📸 Timestamped Photo</h1>
    </div>
    <div class="camera-view">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <img id="preview" class="preview-image" alt="Captured photo">
      <div class="loader" id="loader"></div>
    </div>
    <div class="controls">
      <div class="status" id="status"></div>
      <button class="shutter-button" id="shutter">📷 Capture Photo</button>
      <div class="footer">
        <a href="https://github.com/330k/phototimestamp">GitHub</a>, Powered by: <a href="https://github.com/parallax/jsPDF" target="_blank">jsPDF</a>, <a href="https://cheerpj.com/" target="_blank">CheerpJ</a>, <a href="https://github.com/akr/pdftimestamp" target="_blank">pdftimestamp</a>
      </div>
    </div>
  </div>

  <script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const shutter = document.getElementById('shutter');
const status = document.getElementById('status');
const loader = document.getElementById('loader');
const preview = document.getElementById('preview');
const ctx = canvas.getContext('2d');

// Initialize camera
async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 4032 },
                height: { ideal: 3024 }
            },
            audio: false
        });
        video.srcObject = stream;
    } catch (err) {
        //showStatus('Error accessing camera: ' + err.message, 'error');
        console.error('Camera error:', err);
    }
}
Promise.all([
    initCamera(),
    cheerpjInit({
        version: 17,
        preloadResources: {"/lt/17/lib/modules":[0,131072,1179648,2097152,2228224,4718592,4849664,5373952,5505024,5898240,6029312,6291456,6422528,6553600,6684672,7077888,7733248,8388608,9437184,9699328,9830400,10092544,19005440,19136512,19791872,19922944,21364736,21626880,21757952,22020096,25165824,25296896,26083328,26345472,26738688,27000832,37486592,37617664,38010880,38141952],"/lt/etc/users":[0,131072],"/lt/etc/localtime":[],"/lt/17/jre/lib/cheerpj-handlers.jar":[0,131072],"/lt/17/jre/lib/cheerpj-awt.jar":[0,131072],"/lt/17/jre/lib/cheerpj-jsobject.jar":[0,131072],"/lt/17/conf/security/java.security":[0,131072],"/lt/17/conf/logging.properties":[0,131072],"/lt/17/conf/accessibility.properties":[],"/lt/etc/timezone":[],"/lt/17/lib/tzdb.dat":[0,131072]}
    })
]).then(() => {
    showStatus('Camera ready! Click "Capture Photo" to take a picture.', 'info');
});

// Show status message
function showStatus(message, type) {
    status.textContent = message;
    status.className = 'status ' + type;
}

// Capture photo and process
shutter.addEventListener('click', async () => {
    try {
        shutter.disabled = true;
        const now = new Date();

        // Capture image
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Add Timestamp
        //ctx.fillStyle = "rgb(0 0 0 / 80%)";
        ctx.fillStyle = "rgb(255 165 0 / 80%)";
        ctx.font = "bold 24px monospace";
        ctx.textBaseline = "top";
        ctx.textAlign = "right";
        ctx.fillText(now.toISOString(), canvas.width, 0);

        // Show preview
        const imageDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        preview.src = imageDataUrl;
        //video.style.display = 'none';
        preview.style.display = 'block';

        showStatus('Photo captured! Creating PDF...', 'info');
        loader.style.display = 'block';

        // Convert to PDF
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
            unit: 'px',
            format: [canvas.width, canvas.height]
        });

        pdf.addImage(imageDataUrl, 'JPEG', 0, 0, canvas.width, canvas.height);
        const timestamp = now.toISOString();
        pdf.setProperties({
            title: 'Timestamped Photo',
            subject: 'Taken: ' + now.toISOString(),
            author: 'UserAgent: ' + navigator.userAgent,
            keywords: 'timestamp, photo, pdf',
            creator: 'Timestamped Photo ' + location.href + ' by 330k',
            creationDate: timestamp
        });

        // Add visible timestamp on the PDF
        pdf.setFontSize(10);
        pdf.setTextColor(255, 255, 255);
        pdf.setFillColor(0, 0, 0, 0.7);
        const text = `Timestamp: ${now.toISOString()}`;
        const textWidth = pdf.getTextWidth(text);
        pdf.rect(10, canvas.height - 25, textWidth + 10, 20, 'F');
        pdf.text(text, 15, canvas.height - 12);
        const pdfBlob = pdf.output('blob');

        showStatus('Photo created! Adding timestamp signature...', 'info');

        // Timestamp the PDF
        await timestampPDF(pdfBlob);
        //await (new Promise((resolve, reject) => { setTimeout(resolve, 3000); })); // for Layout

    } catch (err) {
        showStatus('Error: ' + err.message, 'error');
        console.error('Processing error:', err);
    } finally {
        shutter.disabled = false;
        //video.style.display = 'block';
        preview.style.display = 'none';
        loader.style.display = 'none';
        showStatus('Timestamped PDF created!', 'info');
    }
});

// Timestamp PDF using SSL.com's free timestamp service
async function timestampPDF(pdfBlob) {
    try {
        // Convert PDF to ArrayBuffer
        const pdfArrayBuffer = await pdfBlob.arrayBuffer();
        const pdfBytes = new Uint8Array(pdfArrayBuffer);

        await cheerpOSAddStringFile("/str/input.pdf", pdfBytes);
        await cheerpjRunJar("/app" + (new URL('./', location.href)).pathname + "pdftimestamp-all.jar", "http://ts.ssl.com", "/str/input.pdf", "/files/output.pdf");

        const blob = new Blob([await cjFileBlob("/files/output.pdf")], { type: "application/octet-stream" });
        downloadFile(blob, 'timestamped-photo-' + Date.now() + '.pdf');
        showStatus('✅ PDF timestamped and downloaded successfully!', 'success');
    } catch (err) {
        throw new Error('Timestamp failed: ' + err.message);
    }
}

// Download file
function downloadFile(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
