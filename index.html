  <style>
    /* 1. 全体のリセット */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /*background-color: #000;*/
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

      padding: 12px;
    }

    /* 2. アプリ全体のコンテナ */
    .app-container {
      position: relative;
      width: 100%;
      height: calc(100dvh - 24px); /* 動的ビューポート高さを使用 */
      background: white;
      border-radius: 20px;
    }

    .app-header {
      text-align: center;
      height: 50px;
    }
    .app-header h1 {
      font-size: clamp(25px, 5vw , 32px);
    }
    /* 3. カメラプレビュー領域 */
    .camera-view {
      position: absolute;
      top: 50px;
      left: 0;
      width: 100%;
      height: calc(100% - 120px);
      object-fit: contain;
      z-index: 1;
    }
    .camera-view .tutorial {
      position: absolute;
      top: 50%;
      left: 50%;
      text-align: center;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
    .camera-view video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }
    .camera-view canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
      display: none;
    }
    .camera-view img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 3;
      display: none;
    }

    .status {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 20px);
      max-height: 50px;
      overflow: hidden;
      z-index: 4;
      text-align: center;
      padding: 5px;
      border-radius: 10px;
      text-align: center;
      color: #ccc;
      font-size: 14px;
      display: none;
      opacity: 0;
      transition: opacity 0.5s, display 0.5s;
      transition-behavior: allow-discrete;
    }

    .status.info {
      background: #e3f2fd;
      color: #1976d2;
      display: block;
      opacity: 1;
      @starting-style {
        opacity: 0;
      }
    }

    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      display: block;
      opacity: 1;
      @starting-style {
        opacity: 0;
      }
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
      opacity: 1;
      @starting-style {
        opacity: 0;
      }
    }

    /* 4. UIオーバーレイ（操作ボタンなど） */
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      width: 100%;
      height: 70px; /* 操作エリアの高さ */
      justify-content: center;
      align-items: end;
      z-index: 10;
      padding-bottom: env(safe-area-inset-bottom); /* iPhoneのホームバー対策 */
    }

    .geolocator {
      min-width: 24px;
      padding: 15px 15px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 12px;
      background: rgba(192, 192, 192, 0.5);
    }
    .geolocator.enabled {
      background: rgba(52, 199, 89, 0.5);
    }
    /* 5. シャッターボタン */
    .shutter-button {
      min-width: 120px;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-bottom: 12px;
    }
    /*.shutter-button:active {
      transform: scale(0.9);
      background-color: #ccc;
    }*/
    .shutter-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer {
      position: absolute;
      bottom: 0;
      right: 0;
      padding-right: 15px;
      overflow: hidden;
      font-size: clamp(8px, 2vw, 16px);
    }

    .loader {
      position: absolute;
      z-index: 40;
      top: 50%;
      left: 50%;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

<body>

  <div class="app-container">
    <div class="app-header">
      <h1>📸 Timestamped Photo</h1>
    </div>
    <div class="camera-view">
      <div class="tutorial">
To use this app, please select "Allow" to grant access to the camera.<br>
<br>
If you want to embed the geolocation data, please select "Allow" to grant access to your location information.
      </div>
      <video id="video" autoplay playsinline>
        <div>
An experimental program that launches the camera in the browser and adds an LTV enabled timestamp signature to the PDF.

While AI is reducing the evidential value of photos, the concept is to create evidential photos by generating timestamp-signed PDFs directly within the browser.

To enhance evidential value, additional information such as UserAgent and Geolocation API is also embedded.

The timestamp server by SSL.com(http://ts.ssl.com) is used.

Timestamp digital signature can be verified by Adobe Acrobat or Edge.
        </div>
      </video>
      <canvas id="canvas"></canvas>
      <img id="preview" class="preview-image" alt="Captured photo">
      <div class="loader" id="loader"></div>
      <div class="status" id="status">Create PDF with LTV enabled timestamp signature</div>
    </div>
    <div class="controls">
      <button class="geolocator" id="geolocator" title="Add GPS Data">📍</button>
      <button class="shutter-button" id="shutter">📷 Capture Photo</button>
      <div class="footer">
        <a href="https://github.com/330k/phototimestamp">GitHub</a>, Powered by: <a href="https://github.com/parallax/jsPDF" target="_blank">jsPDF</a>, <a href="https://cheerpj.com/" target="_blank">CheerpJ</a>, <a href="https://github.com/akr/pdftimestamp" target="_blank">pdftimestamp</a>
      </div>
    </div>
  </div>

  <script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const geolocator = document.getElementById('geolocator');
const shutter = document.getElementById('shutter');
const loader = document.getElementById('loader');
const preview = document.getElementById('preview');
const ctx = canvas.getContext('2d');
let geoId = null;
let geolocation = null;

/**
 * ツールチップの表示・更新・自動消去を管理するクラス
 */
class TooltipManager {
    constructor(elementId) {
        this.element = document.getElementById(elementId);
        this.timer = null;
        this.displayDuration = 5000; // 5秒
    }

    /**
     * テキストを更新してタイマーを開始する
     * @param {string} message - メッセージ内容
     * @param {string} type - クラス名
     * @param {number|null} duration - 消えるまでの秒数(ms)または永続(null)
     */
    update(message, type, duration) {
        // 1. 既存のタイマーがあればキャンセル（リセット）
        if (this.timer) {
            clearTimeout(this.timer);
        }

        // 2. 内容を書き換えて表示状態にする
        this.element.textContent = message;
        this.element.className = 'status ' + type;

        // 3. 5秒後に消去するタイマーを設定
        if(duration){
            this.timer = setTimeout(() => {
                this.hide();
            }, duration);
        }
    }

    /**
     * ツールチップをフェードアウトさせる
     */
    hide() {
        this.element.className = 'status';
    }
}

/**
 * 位置情報取得の有効/無効状態を管理するクラス
 */
class GeolocationManager {
    constructor(){
        this.watchId = null;
        this.geolocation = null;
    }
    enable(){
        if(navigator.geolocation){
            this.watchId = navigator.geolocation.watchPosition((position) => {
                this.geolocation = position;
            }, (error) => {
                console.log(error);
                navigator.geolocation.clearWatch(this.watchId);
            }, {
                enableHighAccuracy: true
            });
            return true;
        }else{
            return false;
        }
    }
    disable(){
        if(this.watchId){
            navigator.geolocation.clearWatch(geoId);
        }
        this.watchId = null;
        this.geolocation = null;
    }
    isEnabled(){
        return (this.geolocation !== null);
    }
    getGeolocation(){
        return this.geolocation;
    }
}

// Initialize camera
async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 4032 },
                height: { ideal: 3024 }
            },
            audio: false
        });
        video.srcObject = stream;
    } catch (err) {
        throw new Error('Error accessing camera: ' + err.message);
        console.error('Camera error:', err);
    }
}

// Exif用の緯度経度フォーマット文字列を作成
function formatCoordinate(decimal) {
    const abs = Math.abs(decimal);
    const degrees = Math.floor(abs);
    const minutes = ((abs - degrees) * 60).toFixed(2);
    return `${degrees},${minutes}`;
    //return abs;
}
// GPS即位結果からPDFに埋め込むExifデータを作成
function createXmpMetadata(position){
    const latval = formatCoordinate(position.coords.latitude) + ((position.coords.latitude > 0) ? 'N' : 'S');
    const lonval = formatCoordinate(position.coords.longitude) + ((position.coords.longitude > 0) ? 'E' : 'W');
    const altref = '0';
    const altval = (position.coords?.altitude || '0') + '/1';
    const speedref = 'K';
    const speedval = (position.coords?.speed || '0') + '/1';
    const accuracyval = (position.coords?.accuracy || '0') + '/1';
    const d = new Date(position.timestamp);
    const timestampval = d.toISOString();

    const xmpMetadata = `<?xpacket begin="" id="W5M0MpCehiHzreSzNTczkc9d"?>
<x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="Adobe XMP Core 5.6">
 <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
  <rdf:Description rdf:about=""
    xmlns:exif="http://ns.adobe.com/exif/1.0/">
   <exif:GPSLatitude>${latval}</exif:GPSLatitude>
   <exif:GPSLongitude>${lonval}</exif:GPSLongitude>
   <exif:GPSAltitudeRef>${altref}</exif:GPSAltitudeRef>
   <exif:GPSAltitude>${altval}</exif:GPSAltitude>
   <exif:GPSSpeedRef>${speedref}</exif:GPSSpeedRef>
   <exif:GPSSpeed>${speedval}</exif:GPSSpeed>
   <exif:GPSTimeStamp>${timestampval}</exif:GPSTimeStamp>
   <exif:GPSHPositioningError>${accuracyval}</exif:GPSHPositioningError>
  </rdf:Description>
 </rdf:RDF>
</x:xmpmeta>
<?xpacket end="w"?>`;

    return xmpMetadata;
}

const status = new TooltipManager('status');
const geoloc = new GeolocationManager();
shutter.disabled = true;
Promise.all([
    initCamera(),
    cheerpjInit({
        version: 17,
        javaProperties: ['pdftimestamp.urlprefix=https%3A%2F%2Fgeneric-proxy.330k.workers.dev%2F%3Fx-url%3D'],
        preloadResources: {"/lt/17/lib/modules":[0,131072,1179648,5373952,5505024,6291456,6422528,6553600,6684672,7208960,7733248,8519680,9175040,9306112,9437184,10092544,10354688,10485760,19005440,19136512,19791872,19922944,21364736,21626880,21757952,22020096,25165824,25296896,26083328,26476544,26738688,27000832,27787264,27918336,28704768,28835840,29622272,29753344,30015488,30146560,30670848,30801920,35520512,35913728,37486592,37617664,37748736,37879808,38010880,38141952],"/lt/etc/users":[0,131072],"/lt/17/jre/lib/cheerpj-handlers.jar":[0,131072],"/lt/17/jre/lib/cheerpj-awt.jar":[0,131072],"/lt/17/jre/lib/cheerpj-jsobject.jar":[0,131072],"/lt/17/conf/security/java.security":[0,131072],"/lt/17/conf/logging.properties":[0,131072],"/lt/17/lib/tzdb.dat":[0,131072],"/lt/etc/localtime":[],"/lt/17/conf/accessibility.properties":[],"/lt/etc/timezone":[]}
    })
]).then(() => {
    status.update('Camera ready! Click "Capture Photo" to take a picture.', 'info', 10000);
    shutter.disabled = false;
}).catch((error) => {
    status.update(error.message, 'error');
});

// Enable/Disable geolocation
geolocator.addEventListener('click', () => {
    if(geoloc.isEnabled()){
        geoloc.disable();
        geolocator.className = 'geolocator';
    }else{
        if(geoloc.enable()){
            geolocator.className = 'geolocator enabled';
        }
    }
})

// Capture photo and process
shutter.addEventListener('click', async () => {
    try {
        shutter.disabled = true;
        const now = new Date();

        // Capture image
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Add Timestamp
        //ctx.fillStyle = "rgb(0 0 0 / 80%)";
        ctx.fillStyle = "rgb(255 165 0 / 80%)";
        const fontSize = Math.floor(canvas.width * 0.02);
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.textBaseline = "top";
        ctx.textAlign = "right";
        ctx.fillText(now.toISOString(), canvas.width, 0);

        // Show preview
        const imageBlob = await new Promise((resolve, reject) => {
            canvas.toBlob((blob) => {resolve(blob);}, 'image/jpeg', 0.95);
        });
        const imageDataUrl = URL.createObjectURL(imageBlob);
        preview.src = imageDataUrl;
        video.style.display = 'none';
        preview.style.display = 'block';

        status.update('Photo captured! Creating PDF...', 'info');
        loader.style.display = 'block';

        // Convert to PDF
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
            unit: 'px',
            format: [canvas.width, canvas.height],
            putOnlyUsedFonts: true
        });

        pdf.addImage(imageDataUrl, 'JPEG', 0, 0, canvas.width, canvas.height);
        const timestamp = now.toISOString();
        pdf.setDocumentProperties({
            title: 'Timestamped Photo',
            subject: 'ISODateTime: ' + now.toISOString(),
            author: 'UserAgent: ' + navigator.userAgent,
            keywords: 'PDF, timestamp, digital signature, LTV' ,
            creator: 'Timestamped Photo ' + location.href + ' by 330k',
            creationDate: timestamp
        });
        pdf.setDisplayMode('fullpage');
        if(geoloc.isEnabled()){
            pdf.addMetadata(createXmpMetadata(geoloc.getGeolocation()));
        }

        // Add visible timestamp on the PDF
        /*pdf.setFontSize(10);
        pdf.setTextColor(255, 255, 255);
        pdf.setFillColor(0, 0, 0, 0.7);
        const text = `Timestamp: ${now.toISOString()}`;
        const textWidth = pdf.getTextWidth(text);
        pdf.rect(10, canvas.height - 25, textWidth + 10, 20, 'F');
        pdf.text(text, 15, canvas.height - 12);*/

        const pdfBlob = pdf.output('blob');
        status.update('Please wait. Adding timestamp signature...', 'info');

        // Timestamp the PDF
        const timestampedPdfBlob = await timestampPDF(pdfBlob);
        downloadFile(timestampedPdfBlob, 'timestamped-photo-' + now.getTime() + '.pdf');
        //await (new Promise((resolve, reject) => { setTimeout(resolve, 3000); })); // for Layout

    } catch (err) {
        status.update('Error: ' + err.message, 'error');
        console.error('Processing error:', err);
    } finally {
        shutter.disabled = false;
        video.style.display = 'block';
        preview.style.display = 'none';
        if(preview.src){
            URL.revokeObjectURL(preview.src);
        }
        preview.removeAttribute('src');
        loader.style.display = 'none';
        status.update('✅ Timestamped PDF created!', 'info', 10000);
    }
});

// Timestamp PDF using SSL.com's free timestamp service
async function timestampPDF(pdfBlob) {
    try {
        // Convert PDF to ArrayBuffer
        const pdfArrayBuffer = await pdfBlob.arrayBuffer();
        const pdfBytes = new Uint8Array(pdfArrayBuffer);

        const outputfile = "/files/" + crypto.randomUUID() + ".pdf";
        await cheerpOSAddStringFile("/str/input.pdf", pdfBytes);
        await cheerpjRunJar("/app" + (new URL('./', location.href)).pathname + "pdftimestamp-all.jar", "http://ts.ssl.com", "/str/input.pdf", outputfile);

        const blob = new Blob([await cjFileBlob(outputfile)], { type: "application/octet-stream" });
        return blob;
    } catch (err) {
        throw new Error('Timestamp failed: ' + err.message);
    }
}

// Download file
function downloadFile(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
